<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-wrap { width: 100%; max-width: 420px; padding: 1rem; position: relative; z-index: 1; }
        .login-card {
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.75);
            box-shadow: 0 24px 64px rgba(14,165,233,0.14), 0 1px 0 rgba(255,255,255,0.9) inset;
            padding: 2.8rem 2.5rem;
            animation: fadeInUp 0.5s ease forwards;
        }
        .login-logo {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #E0F7FF, #BAE6FD);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.25rem;
            box-shadow: 0 8px 24px rgba(14,165,233,0.2);
            border: 1px solid rgba(14,165,233,0.15);
        }
        .login-logo img { max-height: 44px; }
        .login-title {
            font-size: 1.6rem; font-weight: 800;
            color: #0C4A6E; letter-spacing: -0.03em;
            margin-bottom: 0.3rem;
        }
        .login-sub { color: #64748B; font-size: 0.9rem; margin-bottom: 2rem; }
        .input-group-modern { position: relative; margin-bottom: 1.1rem; }
        .input-label {
            font-size: 0.82rem; font-weight: 600;
            color: #0C4A6E; margin-bottom: 0.4rem;
            display: block; letter-spacing: 0.01em;
        }
        .input-icon-wrap { position: relative; }
        .input-icon {
            position: absolute; left: 1rem; top: 50%;
            transform: translateY(-50%);
            color: #94A3B8; font-size: 1rem; pointer-events: none;
        }
        .modern-input.with-icon { padding-left: 2.75rem; }
        .sign-in-btn {
            width: 100%; padding: 0.85rem;
            background: linear-gradient(135deg, #0EA5E9, #0284C7);
            color: white; border: none; border-radius: 14px;
            font-weight: 700; font-size: 0.95rem;
            letter-spacing: 0.01em;
            box-shadow: 0 6px 20px rgba(14,165,233,0.35);
            transition: all 0.25s ease; cursor: pointer;
            margin-top: 0.5rem; position: relative; overflow: hidden;
        }
        .sign-in-btn::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(rgba(255,255,255,0.12), transparent);
            border-radius: 14px;
        }
        .sign-in-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(14,165,233,0.45);
        }
        .sign-in-btn:active { transform: translateY(0); }
        .divider { height: 1px; background: rgba(14,165,233,0.1); margin: 1.5rem 0; }
        .footer-text { text-align: center; font-size: 0.8rem; color: #94A3B8; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="login-wrap">
    <div class="login-card">
        <div class="text-center">
            <div class="login-logo">
                <img src="{{ url_for('static', filename='images/app_logo.png') }}" alt="Logo">
            </div>
            <div class="login-title">Welcome Back 👋</div>
            <div class="login-sub">Sign in to Smart Attendance System</div>
        </div>

        <form method="POST">
            <div class="input-group-modern">
                <label class="input-label">Username</label>
                <div class="input-icon-wrap">
                    <span class="input-icon">👤</span>
                    <input type="text" name="username" placeholder="Enter your username" class="modern-input with-icon" required>
                </div>
            </div>
            <div class="input-group-modern">
                <label class="input-label">Password</label>
                <div class="input-icon-wrap">
                    <span class="input-icon">🔒</span>
                    <input type="password" name="password" placeholder="Enter your password" class="modern-input with-icon" required>
                </div>
            </div>
            <button type="submit" class="sign-in-btn">Sign In →</button>
        </form>

        <div class="divider"></div>
        <div class="footer-text">Smart Attendance System &copy; 2025</div>
    </div>
</div>

</body>
</html>
